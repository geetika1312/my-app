version: "3.9"

services:

  app:
    build: .
    container_name: node_app

    ports:
      - "5000:5000"

    volumes:
      - .:/app
      - /app/node_modules

    depends_on:
      - mongodb
      - redis

    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/mydb
      - REDIS_HOST=redis
      - REDIS_PORT=6379

    command: npm run dev

  mongodb:
    image: mongo
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: mongo_express

    restart: always

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb

    depends_on:
      - mongodb

  redis:
    image: redis
    container_name: redis

    ports:
      - "6379:6379"

volumes:
  mongo_data: